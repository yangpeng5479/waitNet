name: Build MP3 Compressor

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "app/**"
      - "main.py"
      - "requirements.txt"
      - "mp3-compressor.spec"
      - ".github/workflows/build.yml"
      - "scripts/download_ffmpeg.py"

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download FFmpeg (macOS)
        run: python scripts/download_ffmpeg.py --platform macos

      - name: Build app bundle
        run: pyinstaller mp3-compressor.spec --noconfirm

      - name: Package macOS app as zip
        run: |
          ditto -c -k --keepParent dist/MP3Compressor.app dist/MP3Compressor-macOS.zip
          ls -la dist/MP3Compressor.app dist/MP3Compressor-macOS.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MP3Compressor-macOS
          path: dist/MP3Compressor-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download FFmpeg (Windows)
        run: python scripts/download_ffmpeg.py --platform windows

      - name: Build executable
        run: pyinstaller mp3-compressor.spec --noconfirm

      - name: Package Windows build as zip
        shell: pwsh
        run: |
          Compress-Archive -Path dist/MP3Compressor -DestinationPath dist/MP3Compressor-Windows.zip -Force
          Get-ChildItem dist/MP3Compressor-Windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: MP3Compressor-Windows
          path: dist/MP3Compressor-Windows.zip
